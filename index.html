<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Snacky Almería</title>
  <link rel="stylesheet" href="style.css">
  <script src="app.js" defer></script>
</head>
<body>
<!-- Botón en HTML -->
<button onclick="agregarAlCarrito('Tostadas', 15)">Agregar</button>

  <!-- Bloque “Publícate aquí” -->
  <div class="publicate-aqui">
    <h2>📢 ¡Publícate aquí!</h2>
    <p>¿Tienes un negocio local? Muestra tu anuncio en Snacky Almería y llega a más clientes.</p>
    <a href="https://wa.me/528111248290?text=Hola,%20quiero%20información%20para%20publicitar%20mi%20negocio%20en%20Snacky%20Almería"
       class="btn-publicidad">Contáctanos por WhatsApp</a>
  </div>

  <h1 class="titulo">Snacky Almería</h1>

  <!-- Catálogo dinámico -->
  <h2 class="subtitulo">Snack menu</h2>
  <div id="catalogo"></div>

  <!-- Total y acciones del carrito -->
  <div id="total">Total: $0</div>
  <div id="acciones">
    <button onclick="vaciarCarrito()">Vaciar carrito</button>
    <button onclick="finalizarPedido()">Finalizar pedido</button>
  </div>

</body>
</html>
